[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "voxy-linux"
version = "0.1.0"
description = "Local offline voice dictation for Linux"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
]
dependencies = [
    "faster-whisper",
    "sounddevice",
    "evdev; sys_platform == 'linux'",
    "numpy",
    "dbus-next",
]

[project.scripts]
voxy = "voxy.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
voxy = ["*.wav", "icons/*.svg"]

[project.optional-dependencies]
dev = ["pytest", "mypy", "ruff"]
# Needs system gtk4 + gtk4-layer-shell packages (see presetup-arch.sh).
wayland = ["pygobject", "pycairo"]
x11 = ["pynput", "python-xlib", "pycairo"]

# mypy config lives in mypy.ini (TOML overrides not supported in this mypy version)

[tool.pytest.ini_options]
pythonpath = ["src"]
