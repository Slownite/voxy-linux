[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "voxy"
version = "0.1.0"
description = "Local offline voice dictation for Linux"
requires-python = ">=3.13"
dependencies = [
    "faster-whisper",
    "sounddevice",
    "evdev",
    "pynput",
    "numpy",
]

[project.scripts]
voxy = "voxy.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.mypy]
python_version = "3.13"
strict = true
